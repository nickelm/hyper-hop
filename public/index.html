<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hyper Hop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b1e;
    font-family: "Trebuchet MS", Verdana, sans-serif; touch-action: none;
    -webkit-user-select: none; user-select: none; }
  #gameCanvas { display: block; width: 100%; height: 100%; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; }
  .hidden { display: none !important; }
  @keyframes hop { 0%,100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(-2deg) translateY(-10px); } }
  h1 { animation: hop 1.6s ease-in-out infinite; color: #fff; font-size: clamp(32px, 8vw, 64px); letter-spacing: 2px;
    text-shadow: 0 4px 0 #e6007e, 0 8px 24px rgba(230,0,126,.5); transform: rotate(-2deg); }
  .btn { font-family: inherit; font-size: clamp(18px, 4vw, 26px); font-weight: bold;
    color: #fff; background: linear-gradient(#3ec6ff, #1470d6); border: 4px solid #fff;
    border-radius: 16px; padding: 14px 34px; cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,.35); }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  .btn.green { background: linear-gradient(#7dff5e, #2fae1a); }
  .btn.pink  { background: linear-gradient(#ff5ec6, #d6147f); }
  .btn.small { font-size: 16px; padding: 8px 16px; border-width: 3px; border-radius: 10px; box-shadow: 0 4px 0 rgba(0,0,0,.35); }
  .levelList { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 90vw; }
  .levelItem { display: flex; gap: 6px; align-items: stretch; }
  #hud { position: absolute; top: 10px; left: 0; right: 0; display: flex;
    justify-content: center; pointer-events: none; }
  #hud .bar { width: min(60vw, 400px); height: 14px; background: rgba(0,0,0,.4);
    border: 2px solid #fff; border-radius: 8px; overflow: hidden; }
  #hud .fill { height: 100%; width: 0%; background: linear-gradient(90deg,#7dff5e,#3ec6ff); }
  #attempts { position: absolute; top: 34px; width: 100%; text-align: center;
    color: rgba(255,255,255,.85); font-weight: bold; font-size: 16px; pointer-events: none; }
  /* ---------- Editor ---------- */
  #editorScreen { justify-content: flex-start; background: #14142e; gap: 0; }
  #editorTop { display: flex; gap: 8px; align-items: center; padding: 10px;
    width: 100%; justify-content: center; flex-wrap: wrap; }
  #palette { display: flex; gap: 8px; }
  .tileBtn { width: 52px; height: 52px; border-radius: 12px; border: 3px solid #555a8a;
    background: #1e1e40; font-size: 26px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; }
  .tileBtn.selected { border-color: #7dff5e; background: #2a4a2a; }
  #editorGridWrap { flex: 1; width: 100%; overflow: auto; touch-action: pan-x pan-y;
    padding: 10px; }
  #editorCanvas { background: #1a1a38; border-radius: 8px; touch-action: none; }
  #editorBottom { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; justify-content: center; }
  #exportBox, #importBox { position: absolute; inset: 8%; background: #10102a; border: 4px solid #3ec6ff;
    border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
  #exportText, #importText { flex: 1; width: 100%; background: #05051a; color: #7dff5e; border: none;
    font-family: monospace; font-size: 14px; padding: 10px; white-space: pre; resize: none;
    -webkit-user-select: text; user-select: text; }
  /* Small centered pop-ups: the "Save to server" box and the family-PIN box. */
  #saveBox, #pinBox { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: min(90vw, 380px); background: #10102a; border: 4px solid #3ec6ff; border-radius: 16px;
    padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 30; }
  #saveBox label, #pinBox label { color: #fff; font-weight: bold; }
  .modalInput { height: 48px; border-radius: 12px; border: 3px solid #555a8a; background: #1e1e40;
    color: #fff; font-size: 20px; padding: 0 14px; width: 100%; margin-top: 4px;
    -webkit-user-select: text; user-select: text; }
  #saveBox .warn { color: #ffe14d; font-size: 13px; }
  /* name box: the kid types their level's title here */
  #levelNameInput { height: 52px; border-radius: 12px; border: 3px solid #555a8a;
    background: #1e1e40; color: #fff; font-size: 20px; font-weight: bold; padding: 0 14px;
    min-width: 180px; }
  .toast { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #7dff5e; color: #05051a; font-weight: bold; padding: 10px 22px;
    border-radius: 999px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
  /* ---------- In-game buttons ---------- */
  #topLeftBtns { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px;
    z-index: 15; pointer-events: auto; }
  #practiceBtns { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 15; pointer-events: auto; }
  /* ---------- Practice checkbox on the menu ---------- */
  .practiceRow { display: flex; align-items: center; gap: 10px; color: #fff;
    font-size: clamp(16px, 3.5vw, 22px); font-weight: bold; cursor: pointer; }
  .practiceRow input { width: 28px; height: 28px; accent-color: #7dff5e; }
  /* ---------- Control panel ---------- */
  #controlPanel { position: absolute; inset: 6%; background: #10102a; border: 4px solid #3ec6ff;
    border-radius: 16px; padding: 16px; z-index: 25; display: flex; flex-direction: column; gap: 10px; }
  #controlPanel h2 { color: #fff; text-align: center; font-size: 24px; }
  #panelControls { flex: 1; overflow: auto; display: flex; flex-direction: column; gap: 14px;
    padding: 4px; -webkit-overflow-scrolling: touch; }
  .ctrl { display: flex; flex-direction: column; gap: 4px; color: #fff; }
  .ctrl .row { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
  .ctrl .val { color: #7dff5e; }
  .ctrl .hint { font-size: 12px; color: rgba(255,255,255,.6); font-weight: normal; }
  .ctrl input[type=range] { width: 100%; height: 30px; accent-color: #3ec6ff; }
  .ctrl.toggle .row { cursor: pointer; }
  .ctrl input[type=checkbox] { width: 28px; height: 28px; accent-color: #7dff5e; }
  #panelBottom { display: flex; gap: 8px; justify-content: center; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden"><div class="bar"><div class="fill" id="progressFill"></div></div></div>
<div id="attempts" class="hidden">Attempt 1</div>

<!-- Buttons shown while you are playing -->
<div id="topLeftBtns" class="hidden">
  <button class="btn pink small" id="backBtn">&#8592; Menu</button>
  <button class="btn small" id="gearBtn">&#9881; Settings</button>
</div>

<!-- Practice mode buttons (only show in practice mode) -->
<div id="practiceBtns" class="hidden">
  <button class="btn green small" id="dropCpBtn">&#9873;+ Checkpoint</button>
  <button class="btn pink small" id="removeCpBtn">&#9873;&minus; Remove</button>
</div>

<!-- ======================= MENU ======================= -->
<div id="menuScreen" class="screen">
  <h1>HYPER HOP</h1>
  <div class="levelList" id="levelList"></div>
  <label class="practiceRow"><input type="checkbox" id="practiceChk"> Practice mode (checkpoints)</label>
  <button class="btn pink" id="openEditorBtn">&#9998; Level Editor</button>
</div>

<!-- ======================= CONTROL PANEL ======================= -->
<div id="controlPanel" class="hidden">
  <h2>&#9881; Control Panel</h2>
  <div id="panelControls"></div>
  <div id="panelBottom">
    <button class="btn small" id="resetCfgBtn">Reset to defaults</button>
    <button class="btn green small" id="closePanelBtn">Close &amp; play</button>
  </div>
</div>

<!-- ======================= EDITOR ======================= -->
<div id="editorScreen" class="screen hidden">
  <div id="editorTop">
    <div id="palette"></div>
    <input id="levelNameInput" placeholder="Level name" value="My Level" maxlength="30">
    <button class="btn small" id="tuneBtn">&#9834; Tune</button>
    <button class="btn small" id="widerBtn">Wider +</button>
    <button class="btn small" id="narrowBtn">Shorter &minus;</button>
  </div>
  <div id="editorGridWrap"><canvas id="editorCanvas"></canvas></div>
  <div id="editorBottom">
    <button class="btn green small" id="playTestBtn">&#9654; Play</button>
    <button class="btn green small" id="saveServerBtn">&#8681; Save to server</button>
    <button class="btn small" id="copyBtn">Copy code</button>
    <button class="btn small" id="importBtn">Import</button>
    <button class="btn small" id="clearBtn">Clear</button>
    <button class="btn pink small" id="editorBackBtn">&#8592; Menu</button>
  </div>
</div>

<div id="exportBox" class="hidden">
  <div style="color:#fff;font-weight:bold">Your level code — copy it and send it to Dad!</div>
  <textarea id="exportText" readonly></textarea>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn green small" id="copyForRealBtn">Copy to clipboard</button>
    <button class="btn small" id="closeExportBtn">Close</button>
  </div>
</div>

<div id="importBox" class="hidden">
  <div style="color:#fff;font-weight:bold">Paste a level's code here, then tap Load!</div>
  <textarea id="importText" placeholder="Paste the level code you copied earlier..."></textarea>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn green small" id="loadBtn">Load</button>
    <button class="btn small" id="closeImportBtn">Close</button>
  </div>
</div>

<!-- Save-to-server pop-up: asks for the level's name and who made it. -->
<div id="saveBox" class="hidden">
  <div style="color:#fff;font-weight:bold;font-size:18px">&#8681; Save this level for everyone</div>
  <label>Level name<input id="saveNameInput" class="modalInput" maxlength="30"></label>
  <label>Made by<input id="saveAuthorInput" class="modalInput" maxlength="30" placeholder="Your name" autocomplete="off"></label>
  <div class="warn">Everyone who plays will see this level.</div>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn green small" id="saveConfirmBtn">Save</button>
    <button class="btn small" id="saveCancelBtn">Cancel</button>
  </div>
</div>

<!-- Family-PIN pop-up: shown the first time you save in a session. -->
<div id="pinBox" class="hidden">
  <div id="pinMsg" style="color:#fff;font-weight:bold;font-size:18px">Type the family PIN to save:</div>
  <input id="pinInput" class="modalInput" type="password" inputmode="numeric" autocomplete="off">
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn green small" id="pinOkBtn">OK</button>
    <button class="btn small" id="pinCancelBtn">Cancel</button>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<!-- The chiptune band (MUSIC settings, the SONGS list, and the Music engine).
     Loaded first so the game below can call Music.start() / Music.stop(). -->
<script src="music.js"></script>

<script>
"use strict";

/* ================================================================
   ============  CHANGE THESE NUMBERS AND SEE WHAT HAPPENS!  =======
   ================================================================
   This is the control panel for the whole game. Every number here
   is safe to change. Make gravity weird. Make the cube huge.
   Refresh the page after saving to see your changes.
   ================================================================ */

const CONFIG = {

  // ---------- HOW THE CUBE MOVES ----------
  SCROLL_SPEED: 360,      // how fast the world flies by (pixels per second). Try 200 (easy) or 500 (crazy)
  GRAVITY: 5000,          // how hard the cube falls. Moon = 1500, Earth = 5000, Jupiter = 12000
  JUMP_POWER: 950,        // how strong a jump is. Bigger number = higher jump
  PAD_POWER: 1350,        // how strong the yellow bounce pads are
  SPIN_SPEED: 480,        // how fast the cube spins in the air (degrees per second)

  // ---------- SIZES ----------
  TILE: 40,               // size of one grid square. Everything is built from these
  PLAYER_SIZE: 34,        // how big the cube is (should be a bit smaller than TILE)
  SPIKE_MERCY: 0.35,      // how forgiving spikes are (0 = brutal, 0.5 = very kind)

  // ---------- LOOKS ----------
  PLAYER_COLOR: "#7dff5e",     // the cube. Try "#ff5ec6" or "#ffe14d"
  PLAYER_EYE_COLOR: "#05051a", // the cube's face
  BLOCK_COLOR: "#3ec6ff",      // platforms and blocks
  BLOCK_EDGE: "#ffffff",       // outline on top of blocks
  SPIKE_COLOR: "#ff4d6d",      // the deadly triangles
  PAD_COLOR: "#ffe14d",        // bounce pads
  COIN_COLOR: "#ffd700",       // collectible coins
  GROUND_COLOR: "#222252",     // the floor
  SKY_TOP: "#1a0533",          // background gradient, top...
  SKY_BOTTOM: "#e6007e",       // ...and bottom. Try swapping them!

  // ---------- EFFECTS ----------
  PARTICLES_ON_DEATH: 24, // how many pieces the cube explodes into
  TRAIL: true,            // leave a glowing trail behind the cube? true or false
  SCREEN_SHAKE: 10,       // how much the screen shakes when you die (0 = off)

  // ---------- SOUND ----------
  SOUND: true,            // beeps and boops (jump, coin, death)? true or false
  MUSIC: true,            // background music from music.js? true or false
  MUSIC_VOLUME: 0.5,      // how loud the music is (0 = off, 1 = loud)
  BEAT_PULSE: true,       // make the world flash gently on the beat? true or false
};

// A saved copy of the numbers above, so the "Reset to defaults"
// button in the Control Panel can put everything back the way it was.
const DEFAULTS = { ...CONFIG };

/* ================================================================
   ====================  THE LEVELS  ===============================
   ================================================================
   Draw levels with letters! Each letter is one square:

       .  = empty air
       #  = solid block (you can stand on it, but its side kills you)
       ^  = spike (deadly!)
       o  = bounce pad (launches you high)
       *  = coin (collect it!)
       |  = finish line (you win!)

   The floor is automatic — you do not need to draw it.
   The bottom row of letters sits right on the floor.
   Rows must all be the same length. Add more rows for taller levels.

   You can also pick which tune plays! Each level remembers a  song  number
   (0, 1, 2...) that chooses from the SONGS list in music.js.
   ================================================================
   Levels no longer live in this file! They now live on the server, in
   data/levels.json, and the game downloads them when it starts up (see
   init() near the bottom). The kids build levels in the editor and tap
   "Save to server", so everyone shares the same list of levels.
   The letters above still describe exactly how a level is drawn.
   ================================================================ */

/* ================================================================
   Everything below here is the game engine. You can read it,
   and you can change it — but save a copy first!
   ================================================================ */

// ---------------- Level parsing ----------------
function parseLevel(text) {
  const rows = text.split("\n").map(r => r.replace(/\r/g, "")).filter(r => r.trim().length > 0);
  const width = Math.max(...rows.map(r => r.length));
  const grid = rows.map(r => r.padEnd(width, "."));
  return { grid, cols: width, rows: grid.length };
}

// ---------------- Canvas setup ----------------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---------------- Sound (tiny synth) ----------------
let audioCtx = null;
function beep(freq, dur, type = "square", vol = 0.15, slide = 0) {
  if (!CONFIG.SOUND) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  jump:  () => beep(300, 0.12, "square", 0.12, 200),
  pad:   () => beep(400, 0.2, "square", 0.15, 500),
  coin:  () => { beep(900, 0.08, "sine", 0.15); setTimeout(() => beep(1400, 0.12, "sine", 0.15), 70); },
  death: () => beep(180, 0.4, "sawtooth", 0.2, -120),
  win:   () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, "square", 0.12), i * 110)),
};

// ---------------- Game state ----------------
const S = { screen: "menu", level: null, testMode: false, paused: false, practice: false, songIndex: 0 };
let player, camX, attempts, particles, trail, coinsGot, totalCoins, shake, winT, deadT;
let checkpoints = [];   // in practice mode: the flags the player has dropped (newest last)
let beatPulse = 0;      // 0..1, jumps to 1 on the beat then fades (for the beat pulse)

// The music calls this on every step. There are 2 steps per beat, so the
// even ones (0, 2, 4...) are the beats — that's when we flash the world.
Music.onStep = (i) => { if (CONFIG.BEAT_PULSE && i % 2 === 0) beatPulse = 1; };

function startLevel(parsed, isTest, practice, songIndex) {
  S.level = parsed; S.testMode = !!isTest; S.screen = "game";
  S.paused = false;
  S.practice = !!practice;
  S.songIndex = songIndex || 0;   // which tune from music.js this level plays
  checkpoints = [];             // fresh level = no checkpoints yet
  attempts = 0;
  resetRun();
  showScreen(null);
  document.getElementById("hud").classList.remove("hidden");
  document.getElementById("attempts").classList.remove("hidden");
  document.getElementById("topLeftBtns").classList.remove("hidden");
  document.getElementById("practiceBtns").classList.toggle("hidden", !S.practice);
}
function resetRun() {
  attempts++;
  document.getElementById("attempts").textContent = "Attempt " + attempts;
  const T = CONFIG.TILE;
  player = { x: 0, y: 0, vy: 0, rot: 0, onGround: true, dead: false, won: false };
  camX = -T * 5;                       // little run-up before the level starts
  player.x = camX + T * 2;
  particles = []; trail = []; shake = 0; winT = 0; deadT = 0;
  coinsGot = new Set();
  totalCoins = 0;
  for (const row of S.level.grid) for (const c of row) if (c === "*") totalCoins++;
  // Restart the tune from the very beginning so obstacles line up with the
  // beat again on every attempt (just like the real rhythm games).
  if (CONFIG.MUSIC) Music.start(S.songIndex, CONFIG.MUSIC_VOLUME);
  else Music.stop();
}

// ---------------- Practice mode checkpoints ----------------
// Drop a flag right where the cube is now. On death you come back here.
function dropCheckpoint() {
  if (S.screen !== "game" || !player || player.dead || player.won) return;
  checkpoints.push({
    x: player.x, y: player.y, vy: player.vy, rot: player.rot,
    onGround: player.onGround, camX: camX,
    coins: new Set(coinsGot),          // remember which coins were already grabbed
  });
  sfx.coin();
}
// Take away the newest flag (checkpoints disappear in reverse order).
function removeCheckpoint() {
  if (checkpoints.length === 0) return;
  checkpoints.pop();
  sfx.pad();
}
// Come back to life at the newest flag instead of the start.
function restoreCheckpoint() {
  const cp = checkpoints[checkpoints.length - 1];
  player = { x: cp.x, y: cp.y, vy: cp.vy, rot: cp.rot,
             onGround: cp.onGround, dead: false, won: false };
  camX = cp.camX;
  coinsGot = new Set(cp.coins);
  particles = []; trail = []; shake = 0; winT = 0; deadT = 0;
}

// ---------------- Geometry helpers ----------------
// World: floor is at y = 0, up is negative y. Grid row (rows-1) sits on the floor.
function tileAt(col, row) {
  if (col < 0 || col >= S.level.cols || row < 0 || row >= S.level.rows) return ".";
  return S.level.grid[row][col];
}
function cellTop(row)  { return -(S.level.rows - row) * CONFIG.TILE; }

// ---------------- Physics ----------------
const FIXED_DT = 1 / 240;   // physics runs at 240 Hz so all tablets feel the same
let accumulator = 0, lastTime = 0;

function physicsStep(dt) {
  if (player.dead || player.won) return;
  const T = CONFIG.TILE, half = CONFIG.PLAYER_SIZE / 2;

  player.x += CONFIG.SCROLL_SPEED * dt;
  camX += CONFIG.SCROLL_SPEED * dt;
  player.vy += CONFIG.GRAVITY * dt;
  player.y += player.vy * dt;

  // spin in the air, snap when landed
  if (!player.onGround) player.rot += CONFIG.SPIN_SPEED * dt;

  player.onGround = false;

  // floor
  if (player.y + half >= 0) {
    player.y = -half; player.vy = 0; player.onGround = true;
    player.rot = Math.round(player.rot / 90) * 90;
  }

  // tiles near the player
  const c0 = Math.floor((player.x - half) / T) - 1, c1 = Math.floor((player.x + half) / T) + 1;
  for (let col = c0; col <= c1; col++) {
    for (let row = 0; row < S.level.rows; row++) {
      const ch = tileAt(col, row);
      if (ch === ".") continue;
      const tx = col * T, ty = cellTop(row);            // tile top-left
      const overlapX = player.x + half > tx && player.x - half < tx + T;
      const overlapY = player.y + half > ty && player.y - half < ty + T;

      if (ch === "#") {
        if (!overlapX || !overlapY) continue;
        // Landing: we were above the block last step and are falling
        const prevBottom = player.y + half - player.vy * dt;
        if (player.vy >= 0 && prevBottom <= ty + 6) {
          player.y = ty - half; player.vy = 0; player.onGround = true;
          player.rot = Math.round(player.rot / 90) * 90;
        } else {
          die();                                        // hit the side or bottom
        }
      } else if (ch === "^") {
        // forgiving spike hitbox: a smaller box in the middle
        const m = T * CONFIG.SPIKE_MERCY;
        const hx = tx + m, hw = T - 2 * m, hy = ty + m, hh = T - m;
        if (player.x + half > hx && player.x - half < hx + hw &&
            player.y + half > hy && player.y - half < hy + hh) die();
      } else if (ch === "o") {
        if (overlapX && player.y + half > ty + T * 0.4) {
          player.vy = -CONFIG.PAD_POWER; player.onGround = false; sfx.pad();
        }
      } else if (ch === "*") {
        const key = col + "," + row;
        if (!coinsGot.has(key) && overlapX && overlapY) { coinsGot.add(key); sfx.coin(); }
      } else if (ch === "|") {
        if (player.x + half > tx) win();
      }
    }
  }

  // fell past end of level with no finish line? win anyway
  if (player.x / T > S.level.cols + 3) win();

  if (CONFIG.TRAIL && (trail.length === 0 || Math.abs(trail[trail.length-1].x - player.x) > 6)) {
    trail.push({ x: player.x, y: player.y, life: 1 });
    if (trail.length > 40) trail.shift();
  }
}

function jump() {
  if (S.screen !== "game" || S.paused) return;
  if (player.dead || player.won) return;
  if (player.onGround) { player.vy = -CONFIG.JUMP_POWER; player.onGround = false; sfx.jump(); }
}

function die() {
  if (player.dead) return;
  player.dead = true; deadT = 0; shake = CONFIG.SCREEN_SHAKE; sfx.death();
  for (let i = 0; i < CONFIG.PARTICLES_ON_DEATH; i++) {
    const a = Math.random() * Math.PI * 2, sp = 150 + Math.random() * 450;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 200, life: 1 });
  }
}
function win() {
  if (player.won) return;
  player.won = true; winT = 0; sfx.win();
}

// ---------------- Rendering ----------------
function draw(dt) {
  const T = CONFIG.TILE;
  // background
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, CONFIG.SKY_TOP); sky.addColorStop(1, CONFIG.SKY_BOTTOM);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  if (S.screen !== "game" || !S.level) return;

  // camera: floor sits at 78% of screen height; player is 30% from the left
  const floorY = H * 0.78;
  const sx = wx => (wx - camX);
  const sy = wy => (floorY + wy);
  let shakeX = 0, shakeY = 0;
  if (shake > 0.5) { shakeX = (Math.random()-0.5) * shake; shakeY = (Math.random()-0.5) * shake; shake *= 0.9; }
  ctx.save(); ctx.translate(shakeX, shakeY);

  // Fade the beat pulse a little every frame (the music sets it back to 1 on
  // each beat). We use it below to make the world flash gently in time.
  beatPulse = Math.max(0, beatPulse - dt * 4);

  // parallax dots — brighter for a moment on the beat
  ctx.fillStyle = "rgba(255,255,255," + (0.15 + beatPulse * 0.35) + ")";
  for (let i = 0; i < 40; i++) {
    const px = ((i * 353 - camX * 0.3) % (W + 100) + W + 100) % (W + 100) - 50;
    const py = (i * 197) % (floorY - 40);
    ctx.fillRect(px, py, 3, 3);
  }

  // ground
  ctx.fillStyle = CONFIG.GROUND_COLOR; ctx.fillRect(0, floorY, W, H - floorY);
  // the bright line on top of the floor thickens and glows a touch on the beat
  ctx.fillStyle = "rgba(255,255,255," + (0.6 + beatPulse * 0.4) + ")";
  ctx.fillRect(0, floorY, W, 3 + beatPulse * 3);
  ctx.fillStyle = "rgba(255,255,255,.08)";
  for (let gx = -((camX) % (T*2)); gx < W; gx += T*2) ctx.fillRect(gx, floorY + 6, T, H);

  // tiles
  const colStart = Math.floor(camX / T) - 1, colEnd = Math.floor((camX + W) / T) + 1;
  for (let col = colStart; col <= colEnd; col++) {
    for (let row = 0; row < S.level.rows; row++) {
      const ch = tileAt(col, row);
      if (ch === ".") continue;
      const x = sx(col * T), y = sy(cellTop(row));
      if (ch === "#") {
        ctx.fillStyle = CONFIG.BLOCK_COLOR; ctx.fillRect(x, y, T, T);
        ctx.fillStyle = CONFIG.BLOCK_EDGE; ctx.fillRect(x, y, T, 4);
        ctx.fillStyle = "rgba(0,0,0,.25)"; ctx.fillRect(x, y + T - 5, T, 5);
      } else if (ch === "^") {
        ctx.fillStyle = CONFIG.SPIKE_COLOR;
        ctx.beginPath(); ctx.moveTo(x + T/2, y + 2); ctx.lineTo(x + T - 3, y + T); ctx.lineTo(x + 3, y + T);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      } else if (ch === "o") {
        ctx.fillStyle = CONFIG.PAD_COLOR;
        ctx.beginPath(); ctx.ellipse(x + T/2, y + T - 6, T/2 - 3, 8, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(x + 3, y + T - 8, T - 6, 5);
      } else if (ch === "*") {
        if (coinsGot.has(col + "," + row)) continue;
        const bob = Math.sin(performance.now() / 250 + col) * 4;
        ctx.fillStyle = CONFIG.COIN_COLOR;
        ctx.beginPath(); ctx.arc(x + T/2, y + T/2 + bob, T/3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x + T/2, y + T/2 + bob, T/3 - 6, 0, Math.PI * 2); ctx.stroke();
      } else if (ch === "|") {
        ctx.fillStyle = "#fff"; ctx.fillRect(x + T/2 - 3, y - T, 6, T * 2 + (S.level.rows) * 0);
        for (let f = 0; f < 3; f++) {
          ctx.fillStyle = f % 2 ? "#fff" : "#111";
          ctx.fillRect(x + T/2 + 3, y - T + f * 10, 26, 10);
        }
      }
    }
  }

  // checkpoint flags (practice mode) — little green flags you can respawn at
  for (const cp of checkpoints) {
    const fx = sx(cp.x), fy = sy(cp.y), hs = CONFIG.PLAYER_SIZE / 2;
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(fx, fy + hs); ctx.lineTo(fx, fy - hs - 14); ctx.stroke();
    ctx.fillStyle = "#7dff5e";
    ctx.beginPath();
    ctx.moveTo(fx, fy - hs - 14); ctx.lineTo(fx + 20, fy - hs - 8); ctx.lineTo(fx, fy - hs - 2);
    ctx.closePath(); ctx.fill();
  }

  // trail
  if (CONFIG.TRAIL && !player.dead) {
    for (const t of trail) {
      t.life -= dt * 1.6;
      if (t.life <= 0) continue;
      ctx.fillStyle = CONFIG.PLAYER_COLOR;
      ctx.globalAlpha = t.life * 0.35;
      const s = CONFIG.PLAYER_SIZE * t.life * 0.7;
      ctx.fillRect(sx(t.x) - s/2, sy(t.y) - s/2, s, s);
    }
    ctx.globalAlpha = 1;
  }

  // player
  if (!player.dead) {
    const px = sx(player.x), py = sy(player.y), hs = CONFIG.PLAYER_SIZE / 2;
    ctx.save();
    ctx.translate(px, py); ctx.rotate(player.rot * Math.PI / 180);
    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(-hs, -hs, hs*2, hs*2);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(-hs, -hs, hs*2, hs*2);
    // face
    ctx.fillStyle = CONFIG.PLAYER_EYE_COLOR;
    ctx.fillRect(-hs*0.45, -hs*0.4, hs*0.32, hs*0.5);
    ctx.fillRect(hs*0.13, -hs*0.4, hs*0.32, hs*0.5);
    ctx.fillRect(-hs*0.35, hs*0.25, hs*0.7, hs*0.18);
    ctx.restore();
  }

  // particles
  for (const p of particles) {
    p.life -= dt * 1.2; if (p.life <= 0) continue;
    p.vy += CONFIG.GRAVITY * 0.4 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(sx(p.x) - 4, sy(p.y) - 4, 8, 8);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // progress bar + coins
  const prog = Math.max(0, Math.min(1, (player.x / T) / S.level.cols));
  document.getElementById("progressFill").style.width = (prog * 100) + "%";
  ctx.fillStyle = "#fff"; ctx.font = "bold 18px Trebuchet MS"; ctx.textAlign = "right";
  ctx.fillText("\u25CF " + coinsGot.size + " / " + totalCoins, W - 16, 30);
  ctx.textAlign = "left";

  // win / death overlays
  if (player.won) {
    winT += dt;
    ctx.fillStyle = "rgba(0,0,0,.5)"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#7dff5e"; ctx.font = "bold 54px Trebuchet MS"; ctx.textAlign = "center";
    ctx.fillText("LEVEL COMPLETE!", W/2, H/2 - 20);
    ctx.fillStyle = "#fff"; ctx.font = "bold 22px Trebuchet MS";
    ctx.fillText("Coins: " + coinsGot.size + " / " + totalCoins + "   Attempts: " + attempts, W/2, H/2 + 24);
    ctx.font = "18px Trebuchet MS";
    if (winT > 0.8) ctx.fillText("Tap to continue", W/2, H/2 + 64);
    ctx.textAlign = "left";
  }
  if (player.dead) {
    deadT += dt;
    // In practice mode with a flag dropped, come back at the newest flag.
    // Otherwise (or with no flags yet) start the whole level over.
    if (deadT > 0.9) {
      if (S.practice && checkpoints.length > 0) restoreCheckpoint();
      else resetRun();
    }
  }
}

// ---------------- Main loop ----------------
function frame(t) {
  requestAnimationFrame(frame);
  if (!lastTime) lastTime = t;
  let dt = (t - lastTime) / 1000; lastTime = t;
  if (dt > 0.25) dt = 0.25;                 // tab was hidden; don't teleport
  // Physics only runs while playing AND the control panel is closed.
  if (S.screen === "game" && !S.paused) {
    accumulator += dt;
    while (accumulator >= FIXED_DT) { physicsStep(FIXED_DT); accumulator -= FIXED_DT; }
  } else {
    accumulator = 0;                        // don't pile up time while paused
  }
  draw(dt);
}
requestAnimationFrame(frame);

// ---------------- Input ----------------
let holding = false;
function pressDown(e) {
  if (e.target.closest("button") || e.target.closest("#editorScreen") || e.target.closest("#exportBox") ||
      e.target.closest("#importBox") || e.target.closest("#saveBox") || e.target.closest("#pinBox") ||
      e.target.closest("#controlPanel")) return;
  holding = true;
  if (S.screen === "game") {
    if (player && player.won) { afterWin(); return; }
    jump();
  }
}
function pressUp() { holding = false; }
window.addEventListener("pointerdown", pressDown);
window.addEventListener("pointerup", pressUp);
window.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    if (player && player.won) { afterWin(); return; }
    if (!holding) jump();
    holding = true;
  }
});
window.addEventListener("keyup", () => holding = false);
// hold-to-keep-jumping, like the real game
setInterval(() => { if (holding && S.screen === "game" && !S.paused && player && player.onGround) jump(); }, 40);

// Extra keys: Escape = back (or close the panel), Z = drop checkpoint, X = remove.
window.addEventListener("keydown", e => {
  if (e.code === "Escape") {
    if (isPanelOpen()) closePanel();
    else if (S.screen === "game") leaveGame();
  } else if (S.screen === "game" && S.practice && !S.paused) {
    if (e.code === "KeyZ") dropCheckpoint();
    else if (e.code === "KeyX") removeCheckpoint();
  }
});

// In-game buttons
document.getElementById("backBtn").onclick = leaveGame;
document.getElementById("gearBtn").onclick = openPanel;
document.getElementById("dropCpBtn").onclick = dropCheckpoint;
document.getElementById("removeCpBtn").onclick = removeCheckpoint;

// Leave a level and go back where you came from: the editor if you were
// play-testing, otherwise the main menu. Used by the Menu button, Escape,
// and by tapping after you win.
function leaveGame() {
  closePanel();
  Music.stop();                 // silence the music when we leave the level
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("attempts").classList.add("hidden");
  document.getElementById("topLeftBtns").classList.add("hidden");
  document.getElementById("practiceBtns").classList.add("hidden");
  if (S.testMode) { S.screen = "editor"; showScreen("editorScreen"); }
  else { S.screen = "menu"; showScreen("menuScreen"); }
}
function afterWin() { leaveGame(); }

// ---------------- Screens ----------------
function showScreen(id) {
  for (const s of ["menuScreen", "editorScreen"]) document.getElementById(s).classList.toggle("hidden", s !== id);
  if (id !== null) {
    document.getElementById("hud").classList.add("hidden");
    document.getElementById("attempts").classList.add("hidden");
  }
}

/* ================================================================
   ================  TALKING TO THE SERVER  ========================
   ================================================================
   The game downloads its levels and shared settings from the little
   server (server.js) when it starts. Everything the game asks for
   goes through these helpers. */

// Where the API lives. We work this out from the page's own address so
// the game runs the same whether it's at the top of the site, in a
// subfolder, or on a custom port — no editing needed.
const API_BASE = new URL(".", document.baseURI).pathname + "api";

// The levels we downloaded from the server (the editor's Edit buttons use this).
let serverLevels = [];

// Ask the server for something and get back the answer as data.
async function apiGet(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error("Server said " + res.status);
  return res.json();
}

// Copy the server's saved settings ON TOP OF our CONFIG defaults, so a
// change saved "for everyone" shows up for every player. DEFAULTS was
// captured earlier, so "Reset to defaults" still brings back the code numbers.
function applySettings(overrides) {
  for (const [key, value] of Object.entries(overrides || {})) {
    if (key in CONFIG) CONFIG[key] = value;
  }
}

// The family PIN, remembered ONLY for this visit (never saved to the device,
// on purpose — see CLAUDE.md). We ask for it the first time you save.
let familyPin = null;

// Show the PIN pop-up and wait for the kid to type it. Resolves to the PIN,
// or null if they tapped Cancel.
function askPin(message) {
  return new Promise(resolve => {
    const box = document.getElementById("pinBox");
    const input = document.getElementById("pinInput");
    const okBtn = document.getElementById("pinOkBtn");
    const cancelBtn = document.getElementById("pinCancelBtn");
    document.getElementById("pinMsg").textContent = message || "Type the family PIN to save:";
    input.value = "";
    box.classList.remove("hidden");
    setTimeout(() => input.focus(), 50);
    function done(val) {
      box.classList.add("hidden");
      okBtn.onclick = cancelBtn.onclick = input.onkeydown = null;
      resolve(val);
    }
    okBtn.onclick = () => done(input.value.trim() || null);
    cancelBtn.onclick = () => done(null);
    input.onkeydown = e => { if (e.key === "Enter") done(input.value.trim() || null); };
  });
}

// Send a change to the server with the family PIN attached. If the PIN is
// wrong the server says 401, so we forget it and ask again once.
async function apiWrite(method, path, body) {
  async function send() {
    const res = await fetch(API_BASE + path, {
      method,
      headers: { "Content-Type": "application/json", "X-Family-Pin": familyPin },
      body: body != null ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    return { res, data };
  }
  if (!familyPin) { familyPin = await askPin(); if (!familyPin) throw new Error("cancelled"); }
  let { res, data } = await send();
  if (res.status === 401) {
    familyPin = await askPin("That PIN was wrong. Try again:");
    if (!familyPin) throw new Error("cancelled");
    ({ res, data } = await send());
  }
  if (!res.ok) throw new Error(data.error || ("Server said " + res.status));
  return data;
}

// menu buttons
const list = document.getElementById("levelList");
function buildMenu(levels) {
  list.innerHTML = "";
  if (!levels.length) {
    list.innerHTML = '<div style="color:#fff;font-weight:bold">No levels yet — tap the Level Editor to make one!</div>';
    return;
  }
  levels.forEach((L, i) => {
    const item = document.createElement("div");
    item.className = "levelItem";
    // The big green button plays the level...
    const play = document.createElement("button");
    play.className = "btn green";
    play.textContent = (i + 1) + ". " + L.name + (L.author ? "  — " + L.author : "");
    // Each level plays its own tune: the level's `song`, or the next one in the list.
    const songIndex = (L.song !== undefined && L.song !== null) ? L.song : (i % SONGS.length);
    play.onclick = () => startLevel(parseLevel(L.level), false, document.getElementById("practiceChk").checked, songIndex);
    // ...and the little pencil button opens it in the editor to change it.
    const edit = document.createElement("button");
    edit.className = "btn small"; edit.textContent = "✎"; edit.title = "Edit";
    edit.onclick = () => editLevel(L);
    item.append(play, edit);
    list.appendChild(item);
  });
}

// Open one of the server's levels in the editor so it can be changed and
// saved back in place (instead of making a brand-new copy).
function editLevel(L) {
  const parsed = parseLevel(L.level);
  ED.cols = parsed.cols; ED.rows = parsed.rows;
  ED.grid = parsed.grid.map(row => row.split(""));
  ED.editingId = L.id;                              // remember WHICH level we're changing
  ED.author = L.author || "";
  ED.song = (L.song != null) ? (Number(L.song) % SONGS.length) : 0;
  document.getElementById("levelNameInput").value = L.name;
  updateTuneBtn();
  S.screen = "editor"; showScreen("editorScreen"); drawEditor();
}

// Show a friendly note on the menu (used when the server can't be reached).
function menuMessage(msg) {
  list.innerHTML = '<div style="color:#fff;font-weight:bold;max-width:80vw;text-align:center">' + msg + '</div>';
}

document.getElementById("openEditorBtn").onclick = () => {
  // Opening the editor from the menu starts a brand-new level.
  ED.editingId = null; ED.author = "";
  S.screen = "editor"; showScreen("editorScreen"); drawEditor();
};

/* ================================================================
   ========================  CONTROL PANEL  ========================
   ================================================================
   Sliders and switches you can change WHILE you play (the game
   pauses while the panel is open). These change the same numbers as
   the CONFIG block at the top — but only until you refresh the page.
   To keep a change forever, type it into CONFIG in the code. */

// Each slider: [CONFIG name, label the kids see, smallest, biggest, step]
const PANEL_SLIDERS = [
  ["SCROLL_SPEED", "Scroll speed", 100, 800, 10],
  ["GRAVITY",      "Gravity",      1000, 14000, 100],
  ["JUMP_POWER",   "Jump power",   800, 3500, 50],
  ["PAD_POWER",    "Bounce pad power", 600, 2500, 50],
  ["SPIN_SPEED",   "Spin speed",   0, 900, 10],
  ["TILE",         "Tile size",    24, 64, 1],
  ["PLAYER_SIZE",  "Cube size",    16, 60, 1],
  ["SPIKE_MERCY",  "Spike mercy",  0, 0.5, 0.05],
  ["SCREEN_SHAKE", "Screen shake", 0, 30, 1],
  ["MUSIC_VOLUME", "Music volume", 0, 1, 0.05],
];
// Each switch: [CONFIG name, label]
const PANEL_TOGGLES = [
  ["TRAIL", "Glowing trail"],
  ["SOUND", "Sound"],
  ["MUSIC", "Music"],
  ["BEAT_PULSE", "Beat pulse"],
];

const panelControlsEl = document.getElementById("panelControls");
function buildPanel() {
  panelControlsEl.innerHTML = "";
  for (const [key, label, min, max, step] of PANEL_SLIDERS) {
    const wrap = document.createElement("div");
    wrap.className = "ctrl";
    wrap.innerHTML =
      '<div class="row"><span>' + label + '</span><span class="val"></span></div>' +
      '<input type="range" min="' + min + '" max="' + max + '" step="' + step + '">';
    const slider = wrap.querySelector("input");
    const valEl = wrap.querySelector(".val");
    slider.value = CONFIG[key];
    valEl.textContent = CONFIG[key];
    slider.addEventListener("input", () => {
      CONFIG[key] = Number(slider.value);
      valEl.textContent = slider.value;
      // Music volume is special: change it live while the song plays.
      if (key === "MUSIC_VOLUME") Music.setVolume(CONFIG.MUSIC_VOLUME);
    });
    panelControlsEl.appendChild(wrap);
  }
  for (const [key, label] of PANEL_TOGGLES) {
    const wrap = document.createElement("div");
    wrap.className = "ctrl toggle";
    wrap.innerHTML =
      '<label class="row"><span>' + label + '</span>' +
      '<input type="checkbox"' + (CONFIG[key] ? " checked" : "") + '></label>';
    const box = wrap.querySelector("input");
    box.addEventListener("change", () => {
      CONFIG[key] = box.checked;
      // Turning Music on/off starts or stops the song right away.
      if (key === "MUSIC") { if (box.checked) Music.start(S.songIndex, CONFIG.MUSIC_VOLUME); else Music.stop(); }
    });
    panelControlsEl.appendChild(wrap);
  }
}

function isPanelOpen() { return !document.getElementById("controlPanel").classList.contains("hidden"); }
function openPanel() {
  if (S.screen !== "game") return;
  S.paused = true;
  buildPanel();                 // fill in the sliders with the current numbers
  document.getElementById("controlPanel").classList.remove("hidden");
}
function closePanel() {
  document.getElementById("controlPanel").classList.add("hidden");
  if (S.screen === "game") S.paused = false;
}
document.getElementById("closePanelBtn").onclick = closePanel;
document.getElementById("resetCfgBtn").onclick = () => {
  Object.assign(CONFIG, DEFAULTS);   // put every number back the way it started
  buildPanel();                      // and update the sliders to match
};

/* ================================================================
   ========================  LEVEL EDITOR  =========================
   ================================================================ */
const ED = {
  rows: 6, cols: 40,
  grid: [],
  tool: "#",
  cell: 34,                       // on-screen size of one editor cell
  song: 0,                        // which tune (from music.js SONGS) this level plays
  editingId: null,                // the server level we're changing (null = a brand-new one)
  author: "",                     // who made this level (asked for on the first save)
};
function edInit() {
  ED.grid = Array.from({ length: ED.rows }, () => Array(ED.cols).fill("."));
}
edInit();

const TOOLS = [
  { ch: ".", icon: "\u232B", label: "erase" },
  { ch: "#", icon: "\u2B1B", label: "block" },
  { ch: "^", icon: "\u25B2", label: "spike" },
  { ch: "o", icon: "\u2B24", label: "pad" },
  { ch: "*", icon: "\u2605", label: "coin" },
  { ch: "|", icon: "\uD83C\uDFC1", label: "finish" },
];
const paletteEl = document.getElementById("palette");
TOOLS.forEach(t => {
  const b = document.createElement("div");
  b.className = "tileBtn" + (t.ch === ED.tool ? " selected" : "");
  b.textContent = t.icon; b.title = t.label;
  b.onclick = () => {
    ED.tool = t.ch;
    [...paletteEl.children].forEach(c => c.classList.remove("selected"));
    b.classList.add("selected");
  };
  paletteEl.appendChild(b);
});

const eCanvas = document.getElementById("editorCanvas");
const eCtx = eCanvas.getContext("2d");
function drawEditor() {
  const c = ED.cell;
  eCanvas.width = ED.cols * c; eCanvas.height = ED.rows * c;
  eCtx.fillStyle = "#1a1a38"; eCtx.fillRect(0, 0, eCanvas.width, eCanvas.height);
  for (let r = 0; r < ED.rows; r++) for (let col = 0; col < ED.cols; col++) {
    const x = col * c, y = r * c, ch = ED.grid[r][col];
    eCtx.strokeStyle = "rgba(255,255,255,.08)"; eCtx.strokeRect(x, y, c, c);
    if (ch === "#") { eCtx.fillStyle = CONFIG.BLOCK_COLOR; eCtx.fillRect(x+2, y+2, c-4, c-4); }
    else if (ch === "^") {
      eCtx.fillStyle = CONFIG.SPIKE_COLOR;
      eCtx.beginPath(); eCtx.moveTo(x+c/2, y+3); eCtx.lineTo(x+c-3, y+c-3); eCtx.lineTo(x+3, y+c-3);
      eCtx.closePath(); eCtx.fill();
    }
    else if (ch === "o") { eCtx.fillStyle = CONFIG.PAD_COLOR; eCtx.fillRect(x+4, y+c-10, c-8, 6); }
    else if (ch === "*") { eCtx.fillStyle = CONFIG.COIN_COLOR; eCtx.beginPath(); eCtx.arc(x+c/2, y+c/2, c/3, 0, 7); eCtx.fill(); }
    else if (ch === "|") { eCtx.fillStyle = "#fff"; eCtx.fillRect(x+c/2-2, y+2, 4, c-4); }
  }
  // floor hint
  eCtx.fillStyle = "rgba(255,255,255,.5)";
  eCtx.fillRect(0, eCanvas.height - 2, eCanvas.width, 2);
}
function edPaint(e) {
  const rect = eCanvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left) / ED.cell);
  const r   = Math.floor((e.clientY - rect.top) / ED.cell);
  if (r < 0 || r >= ED.rows || col < 0 || col >= ED.cols) return;
  ED.grid[r][col] = ED.tool;
  drawEditor();
}
let painting = false;
eCanvas.addEventListener("pointerdown", e => { painting = true; edPaint(e); e.stopPropagation(); });
eCanvas.addEventListener("pointermove", e => { if (painting) edPaint(e); });
window.addEventListener("pointerup", () => painting = false);

document.getElementById("widerBtn").onclick = () => {
  ED.cols += 10; ED.grid.forEach(row => { for (let i = 0; i < 10; i++) row.push("."); });
  drawEditor();
};
document.getElementById("narrowBtn").onclick = () => {
  if (ED.cols <= 20) return;
  ED.cols -= 10; ED.grid.forEach(row => row.length = ED.cols);
  drawEditor();
};
document.getElementById("clearBtn").onclick = () => { edInit(); drawEditor(); };
document.getElementById("editorBackBtn").onclick = () => { Music.stop(); S.screen = "menu"; showScreen("menuScreen"); };

// The Tune button shows the current song's name. Tap it to switch to the next
// tune, and it plays a little preview so you can hear which one you picked.
const tuneBtn = document.getElementById("tuneBtn");
function updateTuneBtn() { tuneBtn.textContent = "♪ " + SONGS[ED.song].name; }
tuneBtn.onclick = () => {
  ED.song = (ED.song + 1) % SONGS.length;
  updateTuneBtn();
  if (CONFIG.MUSIC) Music.start(ED.song, CONFIG.MUSIC_VOLUME);   // hear the new tune
};
updateTuneBtn();

function edToText() {
  return ED.grid.map(row => row.join("")).join("\n");
}
document.getElementById("playTestBtn").onclick = () => {
  startLevel(parseLevel(edToText()), true, false, ED.song);
};
// Make the level's name safe to drop inside "..." in the exported code,
// so a name with a quote in it can't break things.
function escapeName(name) {
  return name.replace(/\\/g, "\\\\").replace(/"/g, "\\\"");
}
function levelName() {
  const n = document.getElementById("levelNameInput").value.trim();
  return n === "" ? "My Level" : n;
}
document.getElementById("copyBtn").onclick = () => {
  document.getElementById("exportText").value =
    "{\n  name: \"" + escapeName(levelName()) + "\",\n  song: " + ED.song +
    ",\n  level: `\n" + edToText() + "\n`,\n},";
  document.getElementById("exportBox").classList.remove("hidden");
};
document.getElementById("closeExportBtn").onclick = () => document.getElementById("exportBox").classList.add("hidden");
document.getElementById("copyForRealBtn").onclick = async () => {
  const txt = document.getElementById("exportText").value;
  try { await navigator.clipboard.writeText(txt); }
  catch (e) { document.getElementById("exportText").select(); document.execCommand("copy"); }
  showToast("Copied!");
};

// Little pop-up message at the bottom of the screen.
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1500);
}

// Import: take level code the kid pasted and load it back into the editor.
// It understands the full copied code (with the name and the `...` grid) OR
// just a plain grid on its own.
function importLevel(text) {
  // If there is a name in the pasted code, grab it. Otherwise keep the current name.
  const nameMatch = text.match(/name:\s*"((?:[^"\\]|\\.)*)"/);
  // If there is a song number in the pasted code, grab it too.
  const songMatch = text.match(/song:\s*(\d+)/);
  // If there is a `...` grid block, use only what's inside the backticks.
  const first = text.indexOf("`"), last = text.lastIndexOf("`");
  const gridText = (first !== -1 && last > first) ? text.slice(first + 1, last) : text;

  const parsed = parseLevel(gridText);
  if (parsed.rows === 0 || parsed.cols === 0) { showToast("Couldn't read that"); return; }

  ED.cols = parsed.cols;
  ED.rows = parsed.rows;
  ED.grid = parsed.grid.map(row => row.split(""));
  if (nameMatch) {
    document.getElementById("levelNameInput").value =
      nameMatch[1].replace(/\\"/g, "\"").replace(/\\\\/g, "\\");
  }
  if (songMatch) { ED.song = Number(songMatch[1]) % SONGS.length; updateTuneBtn(); }
  document.getElementById("importBox").classList.add("hidden");
  drawEditor();
}
document.getElementById("importBtn").onclick = () => {
  document.getElementById("importText").value = "";
  document.getElementById("importBox").classList.remove("hidden");
};
document.getElementById("loadBtn").onclick = () => importLevel(document.getElementById("importText").value);
document.getElementById("closeImportBtn").onclick = () => document.getElementById("importBox").classList.add("hidden");

/* ================================================================
   ====================  SAVE TO THE SERVER  =======================
   ================================================================
   "Save to server" sends the level to server.js so everyone can play
   it. The first time you save a new level we ask for a name and who
   made it; after that (and when editing an existing level) it just saves. */

// Actually send the current editor level to the server, then refresh the menu.
async function saveToServer() {
  const body = { name: levelName(), author: ED.author, level: edToText(), song: ED.song };
  try {
    if (ED.editingId != null) {
      await apiWrite("PUT", "/levels/" + ED.editingId, body);
    } else {
      const created = await apiWrite("POST", "/levels", body);
      ED.editingId = created.id;         // from now on, saving updates this same level
    }
    showToast("Saved!");
    serverLevels = await apiGet("/levels");   // keep our copy fresh for the menu
    buildMenu(serverLevels);
  } catch (e) {
    if (e.message !== "cancelled") showToast(e.message);
  }
}

// The Save-pop-up: collects the name + author for a brand-new level.
function openSaveModal() {
  document.getElementById("saveNameInput").value = levelName();
  document.getElementById("saveAuthorInput").value = ED.author || "";
  document.getElementById("saveBox").classList.remove("hidden");
  setTimeout(() => document.getElementById("saveAuthorInput").focus(), 50);
}
document.getElementById("saveServerBtn").onclick = () => {
  // Ask for name + author on a brand-new level; otherwise save straight away.
  if (ED.editingId == null || !ED.author) openSaveModal();
  else saveToServer();
};
document.getElementById("saveConfirmBtn").onclick = () => {
  const name = document.getElementById("saveNameInput").value.trim() || "My Level";
  const author = document.getElementById("saveAuthorInput").value.trim();
  if (!author) { showToast("Please type who made it."); return; }
  document.getElementById("levelNameInput").value = name;
  ED.author = author;
  document.getElementById("saveBox").classList.add("hidden");
  saveToServer();
};
document.getElementById("saveCancelBtn").onclick = () => document.getElementById("saveBox").classList.add("hidden");

/* ================================================================
   ========================  START UP  =============================
   ================================================================
   When the page loads we download the shared settings and the list of
   levels from the server, then build the menu. If the server can't be
   reached we say so instead of showing a blank screen. */
async function init() {
  try {
    const [settings, levels] = await Promise.all([
      apiGet("/settings"),
      apiGet("/levels"),
    ]);
    applySettings(settings);       // shared "Save for everyone" numbers
    serverLevels = levels;
    buildMenu(levels);
  } catch (e) {
    console.error(e);
    menuMessage("Can't reach the game server. Make sure it's running, then reload.");
  }
}
init();

</script>
</body>
