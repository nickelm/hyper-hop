<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hyper Hop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b1e;
    font-family: "Trebuchet MS", Verdana, sans-serif; touch-action: none;
    -webkit-user-select: none; user-select: none; }
  #gameCanvas { display: block; width: 100%; height: 100%; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; }
  .hidden { display: none !important; }
  @keyframes hop { 0%,100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(-2deg) translateY(-10px); } }
  h1 { animation: hop 1.6s ease-in-out infinite; color: #fff; font-size: clamp(32px, 8vw, 64px); letter-spacing: 2px;
    text-shadow: 0 4px 0 #e6007e, 0 8px 24px rgba(230,0,126,.5); transform: rotate(-2deg); }
  .btn { font-family: inherit; font-size: clamp(18px, 4vw, 26px); font-weight: bold;
    color: #fff; background: linear-gradient(#3ec6ff, #1470d6); border: 4px solid #fff;
    border-radius: 16px; padding: 14px 34px; cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,.35); }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  .btn.green { background: linear-gradient(#7dff5e, #2fae1a); }
  .btn.pink  { background: linear-gradient(#ff5ec6, #d6147f); }
  .btn.small { font-size: 16px; padding: 8px 16px; border-width: 3px; border-radius: 10px; box-shadow: 0 4px 0 rgba(0,0,0,.35); }
  .levelList { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 90vw; }
  #hud { position: absolute; top: 10px; left: 0; right: 0; display: flex;
    justify-content: center; pointer-events: none; }
  #hud .bar { width: min(60vw, 400px); height: 14px; background: rgba(0,0,0,.4);
    border: 2px solid #fff; border-radius: 8px; overflow: hidden; }
  #hud .fill { height: 100%; width: 0%; background: linear-gradient(90deg,#7dff5e,#3ec6ff); }
  #attempts { position: absolute; top: 34px; width: 100%; text-align: center;
    color: rgba(255,255,255,.85); font-weight: bold; font-size: 16px; pointer-events: none; }
  /* ---------- Editor ---------- */
  #editorScreen { justify-content: flex-start; background: #14142e; gap: 0; }
  #editorTop { display: flex; gap: 8px; align-items: center; padding: 10px;
    width: 100%; justify-content: center; flex-wrap: wrap; }
  #palette { display: flex; gap: 8px; }
  .tileBtn { width: 52px; height: 52px; border-radius: 12px; border: 3px solid #555a8a;
    background: #1e1e40; font-size: 26px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; }
  .tileBtn.selected { border-color: #7dff5e; background: #2a4a2a; }
  #editorGridWrap { flex: 1; width: 100%; overflow: auto; touch-action: pan-x pan-y;
    padding: 10px; }
  #editorCanvas { background: #1a1a38; border-radius: 8px; touch-action: none; }
  #editorBottom { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; justify-content: center; }
  #exportBox { position: absolute; inset: 8%; background: #10102a; border: 4px solid #3ec6ff;
    border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
  #exportText { flex: 1; width: 100%; background: #05051a; color: #7dff5e; border: none;
    font-family: monospace; font-size: 14px; padding: 10px; white-space: pre; resize: none;
    -webkit-user-select: text; user-select: text; }
  .toast { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #7dff5e; color: #05051a; font-weight: bold; padding: 10px 22px;
    border-radius: 999px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden"><div class="bar"><div class="fill" id="progressFill"></div></div></div>
<div id="attempts" class="hidden">Attempt 1</div>

<!-- ======================= MENU ======================= -->
<div id="menuScreen" class="screen">
  <h1>HYPER HOP</h1>
  <div class="levelList" id="levelList"></div>
  <button class="btn pink" id="openEditorBtn">&#9998; Level Editor</button>
</div>

<!-- ======================= EDITOR ======================= -->
<div id="editorScreen" class="screen hidden">
  <div id="editorTop">
    <div id="palette"></div>
    <button class="btn small" id="widerBtn">Wider +</button>
    <button class="btn small" id="narrowBtn">Shorter &minus;</button>
  </div>
  <div id="editorGridWrap"><canvas id="editorCanvas"></canvas></div>
  <div id="editorBottom">
    <button class="btn green small" id="playTestBtn">&#9654; Play</button>
    <button class="btn small" id="copyBtn">Copy code</button>
    <button class="btn small" id="clearBtn">Clear</button>
    <button class="btn pink small" id="editorBackBtn">&#8592; Menu</button>
  </div>
</div>

<div id="exportBox" class="hidden">
  <div style="color:#fff;font-weight:bold">Your level code — copy it and send it to Dad!</div>
  <textarea id="exportText" readonly></textarea>
  <div style="display:flex;gap:8px;justify-content:center">
    <button class="btn green small" id="copyForRealBtn">Copy to clipboard</button>
    <button class="btn small" id="closeExportBtn">Close</button>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
"use strict";

/* ================================================================
   ============  CHANGE THESE NUMBERS AND SEE WHAT HAPPENS!  =======
   ================================================================
   This is the control panel for the whole game. Every number here
   is safe to change. Make gravity weird. Make the cube huge.
   Refresh the page after saving to see your changes.
   ================================================================ */

const CONFIG = {

  // ---------- HOW THE CUBE MOVES ----------
  SCROLL_SPEED: 360,      // how fast the world flies by (pixels per second). Try 200 (easy) or 500 (crazy)
  GRAVITY: 5000,          // how hard the cube falls. Moon = 1500, Earth = 5000, Jupiter = 12000
  JUMP_POWER: 950,        // how strong a jump is. Bigger number = higher jump
  PAD_POWER: 1350,        // how strong the yellow bounce pads are
  SPIN_SPEED: 480,        // how fast the cube spins in the air (degrees per second)

  // ---------- SIZES ----------
  TILE: 40,               // size of one grid square. Everything is built from these
  PLAYER_SIZE: 34,        // how big the cube is (should be a bit smaller than TILE)
  SPIKE_MERCY: 0.35,      // how forgiving spikes are (0 = brutal, 0.5 = very kind)

  // ---------- LOOKS ----------
  PLAYER_COLOR: "#7dff5e",     // the cube. Try "#ff5ec6" or "#ffe14d"
  PLAYER_EYE_COLOR: "#05051a", // the cube's face
  BLOCK_COLOR: "#3ec6ff",      // platforms and blocks
  BLOCK_EDGE: "#ffffff",       // outline on top of blocks
  SPIKE_COLOR: "#ff4d6d",      // the deadly triangles
  PAD_COLOR: "#ffe14d",        // bounce pads
  COIN_COLOR: "#ffd700",       // collectible coins
  GROUND_COLOR: "#222252",     // the floor
  SKY_TOP: "#1a0533",          // background gradient, top...
  SKY_BOTTOM: "#e6007e",       // ...and bottom. Try swapping them!

  // ---------- EFFECTS ----------
  PARTICLES_ON_DEATH: 24, // how many pieces the cube explodes into
  TRAIL: true,            // leave a glowing trail behind the cube? true or false
  SCREEN_SHAKE: 10,       // how much the screen shakes when you die (0 = off)

  // ---------- SOUND ----------
  SOUND: true,            // beeps and boops? true or false
};

/* ================================================================
   ====================  THE LEVELS  ===============================
   ================================================================
   Draw levels with letters! Each letter is one square:

       .  = empty air
       #  = solid block (you can stand on it, but its side kills you)
       ^  = spike (deadly!)
       o  = bounce pad (launches you high)
       *  = coin (collect it!)
       |  = finish line (you win!)

   The floor is automatic — you do not need to draw it.
   The bottom row of letters sits right on the floor.
   Rows must all be the same length. Add more rows for taller levels.
   ================================================================ */

const LEVELS = [
{
  name: "First Steps",
  level: `
............................................................
............................................................
......................*.....................................
............................###...............*............
.........^.......^....###...###....o......^^...##..........|
`,
},
{
  name: "Spike Alley",
  level: `
..............................................................
...........*.....................*............................
..........###..........o................####..................
..........###.......^..........####.....####.....*............
....^^....###...^^..^^...^^^...####..^^..####...###..^^^.....|
`,
},
{
  name: "Bounce House",
  level: `
....................................................................
.............*..................*...................*...............
............####..............####................####..............
............####....*.........####................####..............
....o.......####....o..........####......o........####......o......|
`,
},
];

/* ================================================================
   Everything below here is the game engine. You can read it,
   and you can change it — but save a copy first!
   ================================================================ */

// ---------------- Level parsing ----------------
function parseLevel(text) {
  const rows = text.split("\n").map(r => r.replace(/\r/g, "")).filter(r => r.trim().length > 0);
  const width = Math.max(...rows.map(r => r.length));
  const grid = rows.map(r => r.padEnd(width, "."));
  return { grid, cols: width, rows: grid.length };
}

// ---------------- Canvas setup ----------------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---------------- Sound (tiny synth) ----------------
let audioCtx = null;
function beep(freq, dur, type = "square", vol = 0.15, slide = 0) {
  if (!CONFIG.SOUND) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  jump:  () => beep(300, 0.12, "square", 0.12, 200),
  pad:   () => beep(400, 0.2, "square", 0.15, 500),
  coin:  () => { beep(900, 0.08, "sine", 0.15); setTimeout(() => beep(1400, 0.12, "sine", 0.15), 70); },
  death: () => beep(180, 0.4, "sawtooth", 0.2, -120),
  win:   () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, "square", 0.12), i * 110)),
};

// ---------------- Game state ----------------
const S = { screen: "menu", level: null, testMode: false };
let player, camX, attempts, particles, trail, coinsGot, totalCoins, shake, winT, deadT;

function startLevel(parsed, isTest) {
  S.level = parsed; S.testMode = !!isTest; S.screen = "game";
  attempts = 0;
  resetRun();
  showScreen(null);
  document.getElementById("hud").classList.remove("hidden");
  document.getElementById("attempts").classList.remove("hidden");
}
function resetRun() {
  attempts++;
  document.getElementById("attempts").textContent = "Attempt " + attempts;
  const T = CONFIG.TILE;
  player = { x: 0, y: 0, vy: 0, rot: 0, onGround: true, dead: false, won: false };
  camX = -T * 5;                       // little run-up before the level starts
  player.x = camX + T * 2;
  particles = []; trail = []; shake = 0; winT = 0; deadT = 0;
  coinsGot = new Set();
  totalCoins = 0;
  for (const row of S.level.grid) for (const c of row) if (c === "*") totalCoins++;
}

// ---------------- Geometry helpers ----------------
// World: floor is at y = 0, up is negative y. Grid row (rows-1) sits on the floor.
function tileAt(col, row) {
  if (col < 0 || col >= S.level.cols || row < 0 || row >= S.level.rows) return ".";
  return S.level.grid[row][col];
}
function cellTop(row)  { return -(S.level.rows - row) * CONFIG.TILE; }

// ---------------- Physics ----------------
const FIXED_DT = 1 / 240;   // physics runs at 240 Hz so all tablets feel the same
let accumulator = 0, lastTime = 0;

function physicsStep(dt) {
  if (player.dead || player.won) return;
  const T = CONFIG.TILE, half = CONFIG.PLAYER_SIZE / 2;

  player.x += CONFIG.SCROLL_SPEED * dt;
  camX += CONFIG.SCROLL_SPEED * dt;
  player.vy += CONFIG.GRAVITY * dt;
  player.y += player.vy * dt;

  // spin in the air, snap when landed
  if (!player.onGround) player.rot += CONFIG.SPIN_SPEED * dt;

  player.onGround = false;

  // floor
  if (player.y + half >= 0) {
    player.y = -half; player.vy = 0; player.onGround = true;
    player.rot = Math.round(player.rot / 90) * 90;
  }

  // tiles near the player
  const c0 = Math.floor((player.x - half) / T) - 1, c1 = Math.floor((player.x + half) / T) + 1;
  for (let col = c0; col <= c1; col++) {
    for (let row = 0; row < S.level.rows; row++) {
      const ch = tileAt(col, row);
      if (ch === ".") continue;
      const tx = col * T, ty = cellTop(row);            // tile top-left
      const overlapX = player.x + half > tx && player.x - half < tx + T;
      const overlapY = player.y + half > ty && player.y - half < ty + T;

      if (ch === "#") {
        if (!overlapX || !overlapY) continue;
        // Landing: we were above the block last step and are falling
        const prevBottom = player.y + half - player.vy * dt;
        if (player.vy >= 0 && prevBottom <= ty + 6) {
          player.y = ty - half; player.vy = 0; player.onGround = true;
          player.rot = Math.round(player.rot / 90) * 90;
        } else {
          die();                                        // hit the side or bottom
        }
      } else if (ch === "^") {
        // forgiving spike hitbox: a smaller box in the middle
        const m = T * CONFIG.SPIKE_MERCY;
        const hx = tx + m, hw = T - 2 * m, hy = ty + m, hh = T - m;
        if (player.x + half > hx && player.x - half < hx + hw &&
            player.y + half > hy && player.y - half < hy + hh) die();
      } else if (ch === "o") {
        if (overlapX && player.y + half > ty + T * 0.4) {
          player.vy = -CONFIG.PAD_POWER; player.onGround = false; sfx.pad();
        }
      } else if (ch === "*") {
        const key = col + "," + row;
        if (!coinsGot.has(key) && overlapX && overlapY) { coinsGot.add(key); sfx.coin(); }
      } else if (ch === "|") {
        if (player.x + half > tx) win();
      }
    }
  }

  // fell past end of level with no finish line? win anyway
  if (player.x / T > S.level.cols + 3) win();

  if (CONFIG.TRAIL && (trail.length === 0 || Math.abs(trail[trail.length-1].x - player.x) > 6)) {
    trail.push({ x: player.x, y: player.y, life: 1 });
    if (trail.length > 40) trail.shift();
  }
}

function jump() {
  if (S.screen !== "game") return;
  if (player.dead || player.won) return;
  if (player.onGround) { player.vy = -CONFIG.JUMP_POWER; player.onGround = false; sfx.jump(); }
}

function die() {
  if (player.dead) return;
  player.dead = true; deadT = 0; shake = CONFIG.SCREEN_SHAKE; sfx.death();
  for (let i = 0; i < CONFIG.PARTICLES_ON_DEATH; i++) {
    const a = Math.random() * Math.PI * 2, sp = 150 + Math.random() * 450;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 200, life: 1 });
  }
}
function win() {
  if (player.won) return;
  player.won = true; winT = 0; sfx.win();
}

// ---------------- Rendering ----------------
function draw(dt) {
  const T = CONFIG.TILE;
  // background
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, CONFIG.SKY_TOP); sky.addColorStop(1, CONFIG.SKY_BOTTOM);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  if (S.screen !== "game" || !S.level) return;

  // camera: floor sits at 78% of screen height; player is 30% from the left
  const floorY = H * 0.78;
  const sx = wx => (wx - camX);
  const sy = wy => (floorY + wy);
  let shakeX = 0, shakeY = 0;
  if (shake > 0.5) { shakeX = (Math.random()-0.5) * shake; shakeY = (Math.random()-0.5) * shake; shake *= 0.9; }
  ctx.save(); ctx.translate(shakeX, shakeY);

  // parallax dots
  ctx.fillStyle = "rgba(255,255,255,.15)";
  for (let i = 0; i < 40; i++) {
    const px = ((i * 353 - camX * 0.3) % (W + 100) + W + 100) % (W + 100) - 50;
    const py = (i * 197) % (floorY - 40);
    ctx.fillRect(px, py, 3, 3);
  }

  // ground
  ctx.fillStyle = CONFIG.GROUND_COLOR; ctx.fillRect(0, floorY, W, H - floorY);
  ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.fillRect(0, floorY, W, 3);
  ctx.fillStyle = "rgba(255,255,255,.08)";
  for (let gx = -((camX) % (T*2)); gx < W; gx += T*2) ctx.fillRect(gx, floorY + 6, T, H);

  // tiles
  const colStart = Math.floor(camX / T) - 1, colEnd = Math.floor((camX + W) / T) + 1;
  for (let col = colStart; col <= colEnd; col++) {
    for (let row = 0; row < S.level.rows; row++) {
      const ch = tileAt(col, row);
      if (ch === ".") continue;
      const x = sx(col * T), y = sy(cellTop(row));
      if (ch === "#") {
        ctx.fillStyle = CONFIG.BLOCK_COLOR; ctx.fillRect(x, y, T, T);
        ctx.fillStyle = CONFIG.BLOCK_EDGE; ctx.fillRect(x, y, T, 4);
        ctx.fillStyle = "rgba(0,0,0,.25)"; ctx.fillRect(x, y + T - 5, T, 5);
      } else if (ch === "^") {
        ctx.fillStyle = CONFIG.SPIKE_COLOR;
        ctx.beginPath(); ctx.moveTo(x + T/2, y + 2); ctx.lineTo(x + T - 3, y + T); ctx.lineTo(x + 3, y + T);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      } else if (ch === "o") {
        ctx.fillStyle = CONFIG.PAD_COLOR;
        ctx.beginPath(); ctx.ellipse(x + T/2, y + T - 6, T/2 - 3, 8, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(x + 3, y + T - 8, T - 6, 5);
      } else if (ch === "*") {
        if (coinsGot.has(col + "," + row)) continue;
        const bob = Math.sin(performance.now() / 250 + col) * 4;
        ctx.fillStyle = CONFIG.COIN_COLOR;
        ctx.beginPath(); ctx.arc(x + T/2, y + T/2 + bob, T/3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x + T/2, y + T/2 + bob, T/3 - 6, 0, Math.PI * 2); ctx.stroke();
      } else if (ch === "|") {
        ctx.fillStyle = "#fff"; ctx.fillRect(x + T/2 - 3, y - T, 6, T * 2 + (S.level.rows) * 0);
        for (let f = 0; f < 3; f++) {
          ctx.fillStyle = f % 2 ? "#fff" : "#111";
          ctx.fillRect(x + T/2 + 3, y - T + f * 10, 26, 10);
        }
      }
    }
  }

  // trail
  if (CONFIG.TRAIL && !player.dead) {
    for (const t of trail) {
      t.life -= dt * 1.6;
      if (t.life <= 0) continue;
      ctx.fillStyle = CONFIG.PLAYER_COLOR;
      ctx.globalAlpha = t.life * 0.35;
      const s = CONFIG.PLAYER_SIZE * t.life * 0.7;
      ctx.fillRect(sx(t.x) - s/2, sy(t.y) - s/2, s, s);
    }
    ctx.globalAlpha = 1;
  }

  // player
  if (!player.dead) {
    const px = sx(player.x), py = sy(player.y), hs = CONFIG.PLAYER_SIZE / 2;
    ctx.save();
    ctx.translate(px, py); ctx.rotate(player.rot * Math.PI / 180);
    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(-hs, -hs, hs*2, hs*2);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(-hs, -hs, hs*2, hs*2);
    // face
    ctx.fillStyle = CONFIG.PLAYER_EYE_COLOR;
    ctx.fillRect(-hs*0.45, -hs*0.4, hs*0.32, hs*0.5);
    ctx.fillRect(hs*0.13, -hs*0.4, hs*0.32, hs*0.5);
    ctx.fillRect(-hs*0.35, hs*0.25, hs*0.7, hs*0.18);
    ctx.restore();
  }

  // particles
  for (const p of particles) {
    p.life -= dt * 1.2; if (p.life <= 0) continue;
    p.vy += CONFIG.GRAVITY * 0.4 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(sx(p.x) - 4, sy(p.y) - 4, 8, 8);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // progress bar + coins
  const prog = Math.max(0, Math.min(1, (player.x / T) / S.level.cols));
  document.getElementById("progressFill").style.width = (prog * 100) + "%";
  ctx.fillStyle = "#fff"; ctx.font = "bold 18px Trebuchet MS"; ctx.textAlign = "right";
  ctx.fillText("\u25CF " + coinsGot.size + " / " + totalCoins, W - 16, 30);
  ctx.textAlign = "left";

  // win / death overlays
  if (player.won) {
    winT += dt;
    ctx.fillStyle = "rgba(0,0,0,.5)"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#7dff5e"; ctx.font = "bold 54px Trebuchet MS"; ctx.textAlign = "center";
    ctx.fillText("LEVEL COMPLETE!", W/2, H/2 - 20);
    ctx.fillStyle = "#fff"; ctx.font = "bold 22px Trebuchet MS";
    ctx.fillText("Coins: " + coinsGot.size + " / " + totalCoins + "   Attempts: " + attempts, W/2, H/2 + 24);
    ctx.font = "18px Trebuchet MS";
    if (winT > 0.8) ctx.fillText("Tap to continue", W/2, H/2 + 64);
    ctx.textAlign = "left";
  }
  if (player.dead) {
    deadT += dt;
    if (deadT > 0.9) resetRun();
  }
}

// ---------------- Main loop ----------------
function frame(t) {
  requestAnimationFrame(frame);
  if (!lastTime) lastTime = t;
  let dt = (t - lastTime) / 1000; lastTime = t;
  if (dt > 0.25) dt = 0.25;                 // tab was hidden; don't teleport
  if (S.screen === "game") {
    accumulator += dt;
    while (accumulator >= FIXED_DT) { physicsStep(FIXED_DT); accumulator -= FIXED_DT; }
  }
  draw(dt);
}
requestAnimationFrame(frame);

// ---------------- Input ----------------
let holding = false;
function pressDown(e) {
  if (e.target.closest("button") || e.target.closest("#editorScreen") || e.target.closest("#exportBox")) return;
  holding = true;
  if (S.screen === "game") {
    if (player && player.won) { afterWin(); return; }
    jump();
  }
}
function pressUp() { holding = false; }
window.addEventListener("pointerdown", pressDown);
window.addEventListener("pointerup", pressUp);
window.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    if (player && player.won) { afterWin(); return; }
    if (!holding) jump();
    holding = true;
  }
});
window.addEventListener("keyup", () => holding = false);
// hold-to-keep-jumping, like the real game
setInterval(() => { if (holding && S.screen === "game" && player && player.onGround) jump(); }, 40);

function afterWin() {
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("attempts").classList.add("hidden");
  if (S.testMode) showScreen("editorScreen"); else { S.screen = "menu"; showScreen("menuScreen"); }
  S.screen = S.testMode ? "editor" : "menu";
}

// ---------------- Screens ----------------
function showScreen(id) {
  for (const s of ["menuScreen", "editorScreen"]) document.getElementById(s).classList.toggle("hidden", s !== id);
  if (id !== null) {
    document.getElementById("hud").classList.add("hidden");
    document.getElementById("attempts").classList.add("hidden");
  }
}

// menu buttons
const list = document.getElementById("levelList");
LEVELS.forEach((L, i) => {
  const b = document.createElement("button");
  b.className = "btn green"; b.textContent = (i + 1) + ". " + L.name;
  b.onclick = () => startLevel(parseLevel(L.level), false);
  list.appendChild(b);
});
document.getElementById("openEditorBtn").onclick = () => { S.screen = "editor"; showScreen("editorScreen"); drawEditor(); };

/* ================================================================
   ========================  LEVEL EDITOR  =========================
   ================================================================ */
const ED = {
  rows: 6, cols: 40,
  grid: [],
  tool: "#",
  cell: 34,                       // on-screen size of one editor cell
};
function edInit() {
  ED.grid = Array.from({ length: ED.rows }, () => Array(ED.cols).fill("."));
}
edInit();

const TOOLS = [
  { ch: ".", icon: "\u232B", label: "erase" },
  { ch: "#", icon: "\u2B1B", label: "block" },
  { ch: "^", icon: "\u25B2", label: "spike" },
  { ch: "o", icon: "\u2B24", label: "pad" },
  { ch: "*", icon: "\u2605", label: "coin" },
  { ch: "|", icon: "\uD83C\uDFC1", label: "finish" },
];
const paletteEl = document.getElementById("palette");
TOOLS.forEach(t => {
  const b = document.createElement("div");
  b.className = "tileBtn" + (t.ch === ED.tool ? " selected" : "");
  b.textContent = t.icon; b.title = t.label;
  b.onclick = () => {
    ED.tool = t.ch;
    [...paletteEl.children].forEach(c => c.classList.remove("selected"));
    b.classList.add("selected");
  };
  paletteEl.appendChild(b);
});

const eCanvas = document.getElementById("editorCanvas");
const eCtx = eCanvas.getContext("2d");
function drawEditor() {
  const c = ED.cell;
  eCanvas.width = ED.cols * c; eCanvas.height = ED.rows * c;
  eCtx.fillStyle = "#1a1a38"; eCtx.fillRect(0, 0, eCanvas.width, eCanvas.height);
  for (let r = 0; r < ED.rows; r++) for (let col = 0; col < ED.cols; col++) {
    const x = col * c, y = r * c, ch = ED.grid[r][col];
    eCtx.strokeStyle = "rgba(255,255,255,.08)"; eCtx.strokeRect(x, y, c, c);
    if (ch === "#") { eCtx.fillStyle = CONFIG.BLOCK_COLOR; eCtx.fillRect(x+2, y+2, c-4, c-4); }
    else if (ch === "^") {
      eCtx.fillStyle = CONFIG.SPIKE_COLOR;
      eCtx.beginPath(); eCtx.moveTo(x+c/2, y+3); eCtx.lineTo(x+c-3, y+c-3); eCtx.lineTo(x+3, y+c-3);
      eCtx.closePath(); eCtx.fill();
    }
    else if (ch === "o") { eCtx.fillStyle = CONFIG.PAD_COLOR; eCtx.fillRect(x+4, y+c-10, c-8, 6); }
    else if (ch === "*") { eCtx.fillStyle = CONFIG.COIN_COLOR; eCtx.beginPath(); eCtx.arc(x+c/2, y+c/2, c/3, 0, 7); eCtx.fill(); }
    else if (ch === "|") { eCtx.fillStyle = "#fff"; eCtx.fillRect(x+c/2-2, y+2, 4, c-4); }
  }
  // floor hint
  eCtx.fillStyle = "rgba(255,255,255,.5)";
  eCtx.fillRect(0, eCanvas.height - 2, eCanvas.width, 2);
}
function edPaint(e) {
  const rect = eCanvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left) / ED.cell);
  const r   = Math.floor((e.clientY - rect.top) / ED.cell);
  if (r < 0 || r >= ED.rows || col < 0 || col >= ED.cols) return;
  ED.grid[r][col] = ED.tool;
  drawEditor();
}
let painting = false;
eCanvas.addEventListener("pointerdown", e => { painting = true; edPaint(e); e.stopPropagation(); });
eCanvas.addEventListener("pointermove", e => { if (painting) edPaint(e); });
window.addEventListener("pointerup", () => painting = false);

document.getElementById("widerBtn").onclick = () => {
  ED.cols += 10; ED.grid.forEach(row => { for (let i = 0; i < 10; i++) row.push("."); });
  drawEditor();
};
document.getElementById("narrowBtn").onclick = () => {
  if (ED.cols <= 20) return;
  ED.cols -= 10; ED.grid.forEach(row => row.length = ED.cols);
  drawEditor();
};
document.getElementById("clearBtn").onclick = () => { edInit(); drawEditor(); };
document.getElementById("editorBackBtn").onclick = () => { S.screen = "menu"; showScreen("menuScreen"); };

function edToText() {
  return ED.grid.map(row => row.join("")).join("\n");
}
document.getElementById("playTestBtn").onclick = () => {
  startLevel(parseLevel(edToText()), true);
};
document.getElementById("copyBtn").onclick = () => {
  document.getElementById("exportText").value =
    "{\n  name: \"My Level\",\n  level: `\n" + edToText() + "\n`,\n},";
  document.getElementById("exportBox").classList.remove("hidden");
};
document.getElementById("closeExportBtn").onclick = () => document.getElementById("exportBox").classList.add("hidden");
document.getElementById("copyForRealBtn").onclick = async () => {
  const txt = document.getElementById("exportText").value;
  try { await navigator.clipboard.writeText(txt); }
  catch (e) { document.getElementById("exportText").select(); document.execCommand("copy"); }
  const toast = document.getElementById("toast");
  toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1500);
};

</script>
</body>
</html>
